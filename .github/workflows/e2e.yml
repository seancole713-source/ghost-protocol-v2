name: E2E Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target app base URL (e.g. https://ghost-protocol-v2-production.up.railway.app)"
        required: false
        default: "https://ghost-protocol-v2-production.up.railway.app"

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://ghost-protocol-v2-production.up.railway.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
