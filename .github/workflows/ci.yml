name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target app base URL for live gates"
        required: false
        default: "https://ghost-protocol-v2-production.up.railway.app"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run fast test suite
        run: make test

      - name: Run compile checks
        run: make test-compile

  integration:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GHOST_INTEGRATION_TESTS: "1"
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip-with-notice instead of hard-fail: an unconfigured secret must not
      # paint every main push red and block release-gates behind it. Configure
      # the TEST_DATABASE_URL repository secret to activate DB integration tests.
      - name: Check TEST_DATABASE_URL secret
        id: dbsecret
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::TEST_DATABASE_URL repository secret not configured — DB integration tests SKIPPED"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.dbsecret.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        if: steps.dbsecret.outputs.configured == 'true'
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run DB integration tests
        if: steps.dbsecret.outputs.configured == 'true'
        run: make test-integration

  playwright-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://ghost-protocol-v2-production.up.railway.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Every push to main triggers a Railway redeploy of the same commit this
      # job is about to smoke-test — without a settle gate the browser suite
      # races the container swap and catches transient 502s (zero-console-error
      # assertions then fail on an infra blip, not a bug). Require 3 consecutive
      # healthy responses before starting.
      - name: Wait for deploy to settle
        run: |
          echo "Waiting for $BASE_URL/health to be stable..."
          ok=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/health" || echo 000)
            if [ "$code" = "200" ]; then
              ok=$((ok+1))
              if [ "$ok" -ge 3 ]; then
                echo "Healthy x3 — proceeding"
                exit 0
              fi
            else
              echo "attempt $i: HTTP $code — resetting streak"
              ok=0
            fi
            sleep 10
          done
          echo "::warning::$BASE_URL/health never stabilized after ~5 min; running smoke anyway"

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

  release-gates:
    if: github.event_name != 'pull_request'
    needs: [test, integration, playwright-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://ghost-protocol-v2-production.up.railway.app' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      ERROR_SIGNATURE_BASELINE: .github/error-signatures-baseline.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # The gate scripts degrade gracefully without CRON_SECRET (public
      # audit-history check instead of POST /api/health/audit) — warn loudly
      # but keep the live go/no-go running rather than failing the whole gate.
      - name: Check CRON_SECRET secret
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET repository secret not configured — health-audit POST path skipped, public checks only"
          fi

      - name: Run deploy go/no-go
        run: bash scripts/go-no-go.sh

      - name: Require zero critical health-audit findings
        run: python3 scripts/verify_health_audit.py

      - name: Alert on new ERROR signatures
        run: python3 scripts/check_error_signatures.py
