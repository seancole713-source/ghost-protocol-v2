name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target app base URL for live gates"
        required: false
        default: "https://ghost-protocol-v2-production.up.railway.app"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run fast test suite
        run: make test

      - name: Run compile checks
        run: make test-compile

  integration:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GHOST_INTEGRATION_TESTS: "1"
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure TEST_DATABASE_URL secret is configured
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "Missing TEST_DATABASE_URL repository secret"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run DB integration tests
        run: make test-integration

  playwright-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://ghost-protocol-v2-production.up.railway.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

  release-gates:
    if: github.event_name != 'pull_request'
    needs: [test, integration, playwright-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://ghost-protocol-v2-production.up.railway.app' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      ERROR_SIGNATURE_BASELINE: .github/error-signatures-baseline.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ensure CRON_SECRET is configured
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET repository secret required for /api/health/audit"
            exit 1
          fi

      - name: Run deploy go/no-go
        run: bash scripts/go-no-go.sh

      - name: Require zero critical health-audit findings
        run: python3 scripts/verify_health_audit.py

      - name: Alert on new ERROR signatures
        run: python3 scripts/check_error_signatures.py
