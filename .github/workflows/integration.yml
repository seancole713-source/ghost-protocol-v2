name: RC Integration

on:
  push:
    tags:
      - "rc-*"       # Release candidate tags: rc-1.2.3, rc-20240601, etc.
      - "v*"         # Version tags: v1.0.0, v2.1.0, etc.
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target deployment URL (defaults to production)"
        required: false
        default: ""

concurrency:
  group: rc-${{ github.ref }}
  cancel-in-progress: false  # Never cancel RC builds mid-flight

jobs:
  # ── Unit tests (fast gate before hitting production) ───────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        env:
          GHOST_TEST_MODE: "1"
        run: pytest tests/ -v --tb=short

  # ── RC release gate checks ─────────────────────────────────────────────────
  rc-release-gates:
    name: RC release gates
    runs-on: ubuntu-latest
    needs: unit-tests
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install gate dependencies
        run: pip install requests

      - name: Resolve target URL
        id: url
        run: |
          INPUT_URL="${{ github.event.inputs.base_url }}"
          SECRET_URL="${{ secrets.BASE_URL }}"
          DEFAULT_URL="https://ghost-protocol-v2-production.up.railway.app"
          TARGET="${INPUT_URL:-${SECRET_URL:-$DEFAULT_URL}}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Deploying gate checks to: $TARGET"

      - name: Wait for Railway deployment
        run: |
          echo "Waiting 90s for Railway RC deployment to stabilise..."
          sleep 90

      - name: Run go/no-go gate (bash orchestrator)
        env:
          BASE_URL: ${{ steps.url.outputs.target }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: bash scripts/go-no-go.sh

      - name: Run verify_health_audit.py
        env:
          BASE_URL: ${{ steps.url.outputs.target }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python scripts/verify_health_audit.py

      - name: Run check_error_signatures.py
        env:
          BASE_URL: ${{ steps.url.outputs.target }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python scripts/check_error_signatures.py

      - name: RC gate summary
        if: always()
        run: |
          echo "RC gate run complete for tag: ${{ github.ref_name }}"
          echo "Target URL: ${{ steps.url.outputs.target }}"
