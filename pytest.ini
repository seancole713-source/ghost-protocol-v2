[pytest]
testpaths = tests
python_files = test_*.py
markers =
    integration: tests requiring an explicit integration database
filterwarnings =
    # sklearn currently passes scipy L-BFGS-B disp/iprint options internally;
    # this is third-party noise, not a Ghost warning. Keep the suite warning-clean
    # while preserving all project warnings as actionable.
    ignore:scipy\.optimize:DeprecationWarning:sklearn\.linear_model\._logistic
