[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
# Gate scripts are standalone — allow untyped defs for brevity
disallow_untyped_defs = False
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True

[mypy-scripts.*]
# Gate scripts use requests which has stubs via types-requests
ignore_missing_imports = False

[mypy-core.*]
# Core modules use psycopg2, xgboost, etc. — stubs not always available
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True
